<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DCA Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script>
// Boot-time error display. Registered synchronously here so it's in place
// BEFORE the ES module script below evaluates — imports are hoisted, so a
// throw inside any imported module would otherwise happen before listeners
// in main.jsx could attach. Shows a red error box inside #root when an
// uncaught error or unhandled rejection occurs during app start.
(function () {
  function escape(s) { return String(s).replace(/[<&]/g, function (c) { return c === '<' ? '&lt;' : '&amp;'; }); }
  function show(label, err) {
    var root = document.getElementById('root');
    if (!root) return;
    var msg = (err && (err.message || String(err))) || 'Unknown error';
    var stack = (err && err.stack) || '';
    root.innerHTML =
      '<div style="font-family:ui-monospace,Menlo,monospace;padding:24px;max-width:760px;margin:24px auto;background:#fff;border:1px solid #f5c2c7;border-radius:8px;color:#842029;">' +
        '<div style="font-weight:700;margin-bottom:8px;">App failed to start (' + label + ')</div>' +
        '<div style="white-space:pre-wrap;font-size:13px;">' + escape(msg) + '</div>' +
        (stack ? '<pre style="margin-top:12px;font-size:11px;color:#6b7280;white-space:pre-wrap;">' + escape(stack) + '</pre>' : '') +
      '</div>';
  }
  window.addEventListener('error', function (e) { show('window.onerror', e.error || e); });
  window.addEventListener('unhandledrejection', function (e) { show('unhandledrejection', e.reason); });
})();
</script>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
