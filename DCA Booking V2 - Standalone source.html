<script>
// Standalone-bundle shim: rewrite "assets/<name>.png" image src/href URLs to
// the inlined blob URLs registered on window.__resources by the bundler.
// This lets the original JSX code (which references string paths) work
// unchanged in the offline file.
(function () {
  function resourceFor(path) {
    if (!path || !window.__resources) return null;
    var m = /assets\/([\w-]+)\.png/.exec(String(path));
    if (!m) return null;
    var id = 'r_' + m[1].replace(/-/g, '_');
    return window.__resources[id] || null;
  }
  function patchEl(el) {
    if (!el || el.nodeType !== 1) return;
    if (el.tagName === 'IMG') {
      var raw = el.getAttribute('src');
      var blob = resourceFor(raw);
      if (blob && el.src !== blob) el.src = blob;
    }
  }
  function scan(root) {
    if (!root) return;
    if (root.tagName === 'IMG') patchEl(root);
    if (root.querySelectorAll) {
      root.querySelectorAll('img').forEach(patchEl);
    }
  }
  // Initial sweep + observe future mutations.
  function start() {
    scan(document.body);
    new MutationObserver(function (muts) {
      for (var i = 0; i < muts.length; i++) {
        var m = muts[i];
        if (m.type === 'attributes' && m.target && m.target.tagName === 'IMG') {
          patchEl(m.target);
        }
        if (m.addedNodes) for (var j = 0; j < m.addedNodes.length; j++) scan(m.addedNodes[j]);
      }
    }).observe(document.body, { subtree: true, childList: true, attributes: true, attributeFilter: ['src'] });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
